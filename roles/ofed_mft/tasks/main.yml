---
- name: Fix broken apt packages from previous runs
  ansible.builtin.command: apt-get --fix-broken install -y
  changed_when: false
  when: mft_enabled | bool
  tags: ["mft", "drivers"]
- name: Download MFT installer archive
  ansible.builtin.get_url:
    url: "{{ mft_installer_url }}"
    dest: "{{ mft_installer_archive }}"
    mode: "0644"
  when: mft_enabled | bool
  tags: ["mft", "drivers"]

- name: Ensure MFT extraction directory exists
  ansible.builtin.file:
    path: "{{ mft_extract_dir }}"
    state: directory
    mode: "0755"
  when: mft_enabled | bool
  tags: ["mft", "drivers"]

- name: Extract MFT archive
  ansible.builtin.unarchive:
    src: "{{ mft_installer_archive }}"
    dest: "{{ mft_extract_dir }}"
    remote_src: true
  when: mft_enabled | bool
  tags: ["mft", "drivers"]

- name: Install MFT package from extracted deb files
  ansible.builtin.shell: |
    set -euo pipefail
    if ! command -v mst >/dev/null 2>&1; then
      DEBS=$(find {{ mft_extract_dir }} -type f -name "*.deb")
      if [ -n "$DEBS" ]; then
        # Use find to locate and pass all debs directly to dpkg
        # Fallback to apt-get install -f to fix nested dependencies like dkms
        echo "$DEBS" | xargs dpkg -i || apt-get install -f -y
      else
        echo "Error: No .deb files found in {{ mft_extract_dir }}" >&2
        exit 1
      fi
    fi
  args:
    executable: /bin/bash
  when: mft_enabled | bool
  changed_when: false
  tags: ["mft", "drivers"]



- name: Download DOCA host repository package
  ansible.builtin.get_url:
    url: "{{ doca_installer_url }}"
    dest: "{{ doca_installer_deb }}"
    mode: "0644"
  when: doca_enabled | bool
  tags: ["doca", "drivers"]

- name: Install DOCA repository package
  ansible.builtin.apt:
    deb: "{{ doca_installer_deb }}"
  when: doca_enabled | bool
  tags: ["doca", "drivers"]

- name: Install doca-all driver set
  ansible.builtin.apt:
    name: doca-all
    state: present
    update_cache: true
  when: doca_enabled | bool
  tags: ["doca", "drivers"]
