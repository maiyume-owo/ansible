---
- name: Purge old RKE2 agent config file
  ansible.builtin.file:
    path: /etc/rancher/rke2/config.yaml
    state: absent
  tags: ["rke2-worker", "kubernetes"]

- name: Stop and disable leftover rke2-agent service
  ansible.builtin.systemd:
    name: rke2-agent
    enabled: false
    state: stopped
  failed_when: false
  tags: ["rke2-worker", "kubernetes"]

- name: Ensure RKE2 config directory exists
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: ["rke2-worker", "kubernetes"]

- name: Download RKE2 installer script
  ansible.builtin.get_url:
    url: https://get.rke2.io
    dest: /tmp/install_rke2.sh
    mode: "0755"
  tags: ["rke2-worker", "kubernetes"]

- name: Install RKE2 node
  ansible.builtin.command: /tmp/install_rke2.sh
  environment:
    INSTALL_RKE2_TYPE: server
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
  args:
    creates: /usr/local/bin/rke2
  tags: ["rke2-worker", "kubernetes"]

- name: Enable and start rke2 service
  ansible.builtin.systemd:
    name: rke2-server
    enabled: true
    state: started
  tags: ["rke2-worker", "kubernetes"]

- name: Wait for RKE2 server to generate kubeconfig
  ansible.builtin.wait_for:
    path: /etc/rancher/rke2/rke2.yaml
    state: present
    timeout: 300
  tags: ["rke2-worker", "kubernetes"]

- name: Wait for Kubernetes API server to be ready
  ansible.builtin.command: >
    kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get nodes
  register: kubectl_nodes
  until: kubectl_nodes.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  tags: ["rke2-worker", "kubernetes"]
