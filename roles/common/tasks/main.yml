---
- name: Get current timezone
  ansible.builtin.command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false
  tags: ["timezone"]

- name: Set system timezone
  ansible.builtin.command: "timedatectl set-timezone {{ system_timezone }}"
  when: current_timezone.stdout != system_timezone
  tags: ["timezone"]

- name: Install baseline packages without proxy
  block:
    - name: Deploy custom sources.list
      ansible.builtin.copy:
        src: sources.list
        dest: /etc/apt/sources.list
        owner: root
        group: root
        mode: '0644'
    - name: Ensure universe repository is enabled (required for chrpath)
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu/ {{ ansible_distribution_release }} universe"
        state: present

    - name: Aggressively clean APT lists to fix held broken packages
      ansible.builtin.shell: |
        rm -rf /var/lib/apt/lists/*
        apt-get clean
      args:
        warn: false
      changed_when: true

    - name: Update apt cache and fix broken dependencies
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      register: apt_update_result
      # Optional: you can run `apt-get --fix-broken install` if needed via shell, but a clean update usually resolves it natively.
      ansible.builtin.apt:
        name: "{{ baseline_packages }}"
        state: present
        update_cache: true
  tags: ["baseline", "performance"]

- name: Check if a reboot is required after baseline upgrades
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  tags: ["baseline", "performance", "reboot"]

- name: Reboot after installing baseline packages if needed
  ansible.builtin.reboot:
    msg: "Rebooting nodes gracefully post fundamental baseline updates"
    reboot_timeout: 600
  when: reboot_required_file.stat.exists
  tags: ["baseline", "performance", "reboot"]

- name: Persist CPU governor setting
  ansible.builtin.template:
    src: cpufrequtils.j2
    dest: /etc/default/cpufrequtils
    owner: root
    group: root
    mode: "0644"
  notify: Restart cpufrequtils
  tags: ["performance", "cpu-tuning"]

- name: Ensure cpufrequtils service is enabled and running
  ansible.builtin.systemd:
    name: cpufrequtils
    enabled: true
    state: started
  tags: ["performance", "cpu-tuning"]
