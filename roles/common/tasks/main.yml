---
- name: Get current timezone
  ansible.builtin.command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false
  tags: ["timezone"]

- name: Set system timezone
  ansible.builtin.command: "timedatectl set-timezone {{ system_timezone }}"
  when: current_timezone.stdout != system_timezone
  tags: ["timezone"]

- name: Install baseline packages with temporary apt proxy
  block:
    - name: Ensure universe repository is enabled (required for chrpath)
      ansible.builtin.apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu/ {{ ansible_distribution_release }} universe"
        state: present

    - name: Clean stale APT lists (forces re-fetch via proxy)
      ansible.builtin.file:
        path: "/var/lib/apt/lists/{{ item }}"
        state: absent
      loop: ["lock", "partial"]
      # More aggressively, you could use 'ansible.builtin.command: rm -rf /var/lib/apt/lists/*' but this is safer.

    - name: Install baseline package set
      ansible.builtin.apt:
        name: "{{ baseline_packages }}"
        state: present
        update_cache: true
  environment:
    http_proxy: "{{ apt_proxy_url }}"
    https_proxy: "{{ apt_proxy_url }}"
  tags: ["baseline", "performance"]

- name: Persist CPU governor setting
  ansible.builtin.template:
    src: cpufrequtils.j2
    dest: /etc/default/cpufrequtils
    owner: root
    group: root
    mode: "0644"
  notify: Restart cpufrequtils
  tags: ["performance", "cpu-tuning"]

- name: Ensure cpufrequtils service is enabled and running
  ansible.builtin.systemd:
    name: cpufrequtils
    enabled: true
    state: started
  tags: ["performance", "cpu-tuning"]
