---
- name: Install Docker repository prerequisites with temporary apt proxy
  block:
    - name: Configure temporary apt proxy
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/99temporary-proxy
        content: "Acquire::http::Proxy \"{{ apt_proxy_url }}\";\n"
        owner: root
        group: root
        mode: "0644"

    - name: Install prerequisite packages for Docker repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
  always:
    - name: Remove temporary apt proxy
      ansible.builtin.file:
        path: /etc/apt/apt.conf.d/99temporary-proxy
        state: absent
  tags: ["docker", "container-runtime"]

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: ["docker", "container-runtime"]

- name: Set Docker/NVIDIA repository architecture mapping
  ansible.builtin.set_fact:
    repo_arch: "{{ 'amd64' if ansible_architecture in ['x86_64', 'amd64'] else ansible_architecture }}"
  tags: ["docker", "nvidia-toolkit", "container-runtime"]

- name: Install Docker apt GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.asc
    mode: "0644"
  tags: ["docker", "container-runtime"]

- name: Convert Docker key to dearmored keyring
  ansible.builtin.command: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.gpg
  tags: ["docker", "container-runtime"]

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ repo_arch }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} {{ docker_apt_release_channel }}"
    state: present
    filename: docker
  tags: ["docker", "container-runtime"]

- name: Add NVIDIA container toolkit apt key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /tmp/nvidia-container-toolkit.asc
    mode: "0644"
  tags: ["nvidia-toolkit", "container-runtime"]

- name: Convert NVIDIA key to dearmored keyring
  ansible.builtin.command: gpg --dearmor -o /etc/apt/keyrings/nvidia-container-toolkit.gpg /tmp/nvidia-container-toolkit.asc
  args:
    creates: /etc/apt/keyrings/nvidia-container-toolkit.gpg
  tags: ["nvidia-toolkit", "container-runtime"]

- name: Add NVIDIA container toolkit repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/{{ repo_arch }} /"
    state: present
    filename: nvidia-container-toolkit
  tags: ["nvidia-toolkit", "container-runtime"]

- name: Install Docker and NVIDIA container toolkit with temporary apt proxy
  block:
    - name: Configure temporary apt proxy
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/99temporary-proxy
        content: "Acquire::http::Proxy \"{{ apt_proxy_url }}\";\n"
        owner: root
        group: root
        mode: "0644"

    - name: Install Docker engine and NVIDIA toolkit packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - nvidia-container-toolkit
        state: present
        update_cache: true
  always:
    - name: Remove temporary apt proxy
      ansible.builtin.file:
        path: /etc/apt/apt.conf.d/99temporary-proxy
        state: absent
  tags: ["docker", "nvidia-toolkit", "container-runtime"]

- name: Configure Docker daemon with NVIDIA runtime
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "default-runtime": "nvidia",
        "runtimes": {
          "nvidia": {
            "path": "nvidia-container-runtime",
            "runtimeArgs": []
          }
        }
      }
  notify: Restart docker
  tags: ["docker", "nvidia-toolkit", "container-runtime"]

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  tags: ["docker", "container-runtime"]
