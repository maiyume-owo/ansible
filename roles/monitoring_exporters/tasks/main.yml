---
- name: Ensure node exporter service is enabled and running
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    enabled: true
    state: started
  when: node_exporter_enabled | bool
  tags: ["monitoring", "node-exporter"]

- name: Deploy DCGM exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/dcgm-exporter.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=NVIDIA DCGM Exporter
      After=docker.service
      Requires=docker.service

      [Service]
      Type=simple
      ExecStartPre=-/usr/bin/docker rm -f dcgm-exporter
      ExecStart=/usr/bin/docker run --rm --name dcgm-exporter --gpus all --cap-add SYS_ADMIN -p {{ dcgm_exporter_listen_port }}:9400 {{ dcgm_exporter_image }}
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  when: dcgm_exporter_enabled | bool
  notify:
    - Reload systemd
    - Restart dcgm exporter
  tags: ["monitoring", "dcgm-exporter"]

- name: Ensure dcgm exporter service is enabled and running
  ansible.builtin.systemd:
    name: dcgm-exporter
    enabled: true
    state: started
  when: dcgm_exporter_enabled | bool
  tags: ["monitoring", "dcgm-exporter"]
